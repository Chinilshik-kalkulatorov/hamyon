# Production stack. Run with:
#   docker compose --env-file .env.prod -f docker-compose.prod.yml up -d --build
# (or simply `make deploy`)

# Distinct project name so the prod stack never collides with the dev
# docker-compose.yml (separate containers, network and volumes).
name: hamyon-prod

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  web:
    build: .
    env_file: .env.prod
    entrypoint: ["/app/entrypoint.sh"]
    # Overriding entrypoint resets the Dockerfile CMD, so repeat it here:
    # entrypoint.sh runs migrate/collectstatic/seed, then exec's this.
    command: ["gunicorn", "config.wsgi:application", "--bind", "0.0.0.0:8000", "--workers", "3", "--timeout", "60"]
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    depends_on:
      db: {condition: service_healthy}
      redis: {condition: service_healthy}
    restart: unless-stopped

  worker:
    build: .
    env_file: .env.prod
    command: celery -A config worker -l info
    volumes:
      - media_volume:/app/media
    depends_on:
      db: {condition: service_healthy}
      redis: {condition: service_healthy}
    restart: unless-stopped

  beat:
    build: .
    env_file: .env.prod
    command: celery -A config beat -l info
    depends_on:
      db: {condition: service_healthy}
      redis: {condition: service_healthy}
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/var/www/static:ro
      - media_volume:/var/www/media:ro
    depends_on:
      - web
    restart: unless-stopped

volumes:
  pgdata:
  static_volume:
  media_volume:
