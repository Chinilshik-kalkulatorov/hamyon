server {
    listen 80;
    server_name _;

    client_max_body_size 10m;

    # Docker's embedded DNS. Combined with a variable in proxy_pass below, this
    # makes nginx re-resolve `web` at request time instead of caching the IP at
    # startup — so recreating the web container (docker compose up --build web)
    # no longer leaves nginx pointing at a dead address (the old 502-on-deploy).
    resolver 127.0.0.11 valid=10s ipv6=off;

    location /static/ {
        alias /var/www/static/;
        access_log off;
        expires 30d;
    }

    location /media/ {
        alias /var/www/media/;
        access_log off;
        expires 30d;
    }

    location / {
        # Variable forces runtime resolution via the resolver above.
        set $upstream_web web:8000;
        proxy_pass http://$upstream_web;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # За Cloudflare Tunnel внешнее соединение всегда HTTPS (TLS терминируется
        # на edge Cloudflare). cloudflared->nginx идёт по http, поэтому $scheme
        # здесь = http; жёстко проставляем https, иначе Django (USE_X_FORWARDED_PROTO)
        # сочтёт запрос незащищённым и сломает CSRF/secure-cookies в /admin/.
        proxy_set_header X-Forwarded-Proto https;
        proxy_redirect off;
    }
}
