name: CI

on:
  push:
    branches: [main, deploy-with-ui]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run test suite
        run: pytest -q
        # Tests are self-contained: sqlite (in-memory) + fakeredis + eager Celery
        # via config.settings_test — no Postgres/Redis services needed.
