name: Deploy

# Auto-deploy to the GCP VM on every push to deploy-with-ui (after code lands).
# Replaces the manual "gcloud ssh -> git pull -> docker compose build" dance.
#
# ONE-TIME SETUP (run locally once, then never again):
#   PROJECT=sap-voice-bot-063568
#   gcloud iam service-accounts create gh-deploy --project=$PROJECT
#   SA=gh-deploy@$PROJECT.iam.gserviceaccount.com
#   gcloud projects add-iam-policy-binding $PROJECT \
#       --member="serviceAccount:$SA" --role="roles/compute.instanceAdmin.v1"
#   gcloud projects add-iam-policy-binding $PROJECT \
#       --member="serviceAccount:$SA" --role="roles/iam.serviceAccountUser"
#   gcloud iam service-accounts keys create /tmp/gh-deploy.json --iam-account=$SA
#   gh secret set GCP_SA_KEY < /tmp/gh-deploy.json   # add the secret to the repo
#   rm /tmp/gh-deploy.json                            # don't keep the key around
#
# After that, every push to deploy-with-ui deploys itself.

on:
  push:
    branches: [deploy-with-ui]
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - uses: google-github-actions/setup-gcloud@v2
      - name: Pull + rebuild on the VM
        run: |
          gcloud compute ssh hamyon-1 --zone=us-central1-a --quiet --command '
            set -e
            cd ~/hamyon
            git pull --ff-only origin deploy-with-ui
            C="sudo docker compose --env-file .env.prod -f docker-compose.prod.yml"
            $C up -d --build web bot
            # nginx now re-resolves web via Docker DNS; just reload for config changes.
            $C exec -T nginx nginx -s reload || $C restart nginx
            for i in $(seq 1 8); do
              code=$(curl -sS -o /dev/null -w "%{http_code}" https://hamyon.duckdns.org/ || true)
              [ "$code" = "200" ] && { echo "deploy OK ($code)"; exit 0; }
              sleep 8
            done
            echo "site did not return 200 after deploy" >&2
            exit 1
          '
