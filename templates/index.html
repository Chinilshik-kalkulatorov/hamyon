<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Hamyon</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Onest:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0a0a; --card:#141414; --card2:#101010; --line:#1f1f1f; --line2:#2a2a2a;
    --text:#f4f4f4; --muted:#a8a8a8; --dim:#6a6a6a;
    --accent:#5B21B6; --accent2:#7C3AED; --accent-tx:#A78BFA; --cyan:#229ED9;
    --red:#E4485D; --amber:#E8C47A; --info:#229ED9;
    --mono:"JetBrains Mono",ui-monospace,SFMono-Regular,Menlo,monospace;
    --shadow:none; --glow:0 0 18px rgba(91,33,182,.2);
    --r:16px;
  }
  *{box-sizing:border-box} html,body{margin:0;padding:0}
  body{
    background-color:var(--bg);
    background-image:
      linear-gradient(to right,#151515 1px,transparent 1px),
      linear-gradient(to bottom,#151515 1px,transparent 1px);
    background-size:40px 40px;
    color:var(--text);
    font:15px/1.5 "Onest",-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Roboto,sans-serif;
    min-height:100vh; -webkit-font-smoothing:antialiased; overflow-x:hidden;
  }
  .hidden{display:none!important}
  button{font:inherit;cursor:pointer;border:0;border-radius:11px;color:var(--text);background:none}
  input,textarea{font:inherit;color:var(--text);background:var(--card2);
    border:1px solid var(--line2);border-radius:11px;padding:12px 14px;outline:none;width:100%;
    transition:border-color .15s, box-shadow .15s}
  input:focus,textarea:focus{border-color:var(--accent2);box-shadow:0 0 0 3px rgba(91,33,182,.18)}
  ::placeholder{color:var(--dim)}
  svg{display:block}
  code{font-family:var(--mono)}
  #invLeft{font-family:var(--mono)}

  .btn{width:100%;padding:13px 18px;border-radius:12px;font-weight:600;letter-spacing:.2px;
       display:flex;align-items:center;justify-content:center;gap:8px;transition:.15s}
  .btn-primary{background:var(--accent);color:#fff}
  .btn-primary:hover{background:var(--accent2)}
  .btn-primary:disabled{opacity:.5;cursor:default}
  .btn-ghost{background:transparent;border:1px solid var(--line2);color:var(--text)}
  .btn-ghost:hover{border-color:var(--accent2);color:var(--accent-tx)}
  .busy{position:relative;color:transparent!important}
  .busy::after{content:"";position:absolute;width:18px;height:18px;border-radius:50%;
    border:2.5px solid rgba(255,255,255,.3);border-top-color:#fff;animation:spin .7s linear infinite}
  .btn-ghost.busy::after{border-color:rgba(255,255,255,.2);border-top-color:var(--accent2)}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* ---------- language toggle (one click switches RU<->UZ) ---------- */
  .langtog{flex:none;min-width:40px;padding:6px 11px;border-radius:999px;text-align:center;
    background:var(--card2);border:1px solid var(--line2);
    font-family:var(--mono);font-size:12px;font-weight:600;color:var(--muted);transition:.15s}
  .langtog:hover{border-color:var(--dim);color:var(--text)}

  /* ---------- login ---------- */
  .login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
  .login{width:420px;background:var(--card);
    border:1px solid var(--line2);border-radius:22px;padding:36px;
    animation:fadeUp .4s ease}
  .login-head{display:flex;align-items:center;justify-content:space-between}
  .logo{display:flex;align-items:center;gap:13px}
  .logo-badge{width:46px;height:46px;border-radius:14px;display:grid;place-items:center;
    background:var(--accent);color:#fff;flex:none;box-shadow:var(--glow)}
  .logo h1{font-size:25px;margin:0;letter-spacing:-.02em;font-weight:600}
  .sub{color:var(--muted);margin:6px 0 22px;font-size:13.5px}
  .demo-accounts{display:grid;gap:10px;margin-bottom:20px}
  .acc{display:flex;align-items:center;gap:13px;padding:13px 15px;border-radius:12px;
    background:var(--card2);border:1px solid var(--line2);text-align:left;transition:.15s}
  .acc:hover{border-color:var(--accent2)}
  .acc .meta{flex:1}
  .acc .n{font-weight:600}
  .acc .d{font-size:12px;color:var(--muted);font-family:var(--mono)}
  .acc .go{color:var(--dim)}
  .divider{display:flex;align-items:center;gap:12px;color:var(--dim);font-size:12px;margin:4px 0 16px}
  .divider::before,.divider::after{content:"";flex:1;height:1px;background:var(--line2)}
  .field{margin-bottom:11px}
  .err{color:var(--red);font-size:13px;min-height:18px;margin-top:10px}

  .avatar{width:40px;height:40px;border-radius:50%;display:grid;place-items:center;
    font-weight:700;font-size:16px;color:#fff;flex:none}
  .av-0{background:linear-gradient(135deg,#7C3AED,#5B21B6)}
  .av-1{background:linear-gradient(135deg,#4d7df2,#3f51c9)}
  .av-2{background:linear-gradient(135deg,#c163e8,#7d4bd6)}
  .av-3{background:linear-gradient(135deg,#f2884d,#d6593b)}

  /* ---------- app shell ---------- */
  .top{display:flex;align-items:center;justify-content:space-between;
    padding:15px 30px;border-bottom:1px solid var(--line);
    background:rgba(10,10,10,.72);backdrop-filter:blur(12px);position:sticky;top:0;z-index:5}
  .top .logo h1{font-size:18px}
  .top .logo-badge{width:34px;height:34px;border-radius:10px}
  .userbox{display:flex;align-items:center;gap:10px}
  .iconbtn{width:36px;height:36px;border-radius:11px;display:grid;place-items:center;flex:none;
    text-decoration:none;transition:.15s}
  .botlink{background:var(--info);color:#fff}
  .botlink:hover{filter:brightness(1.08)}
  .chip{padding:4px 11px;border-radius:999px;font-size:11px;font-weight:600;letter-spacing:.04em;font-family:var(--mono)}
  .kyc-full{background:rgba(91,33,182,.16);color:var(--accent-tx)}
  .kyc-basic{background:rgba(34,158,217,.14);color:var(--info)}
  .kyc-unverified{background:#1f1f1f;color:var(--muted)}
  .uname{font-weight:600}
  .userbox .avatar{width:34px;height:34px;font-size:14px}
  .logout{color:var(--muted);background:var(--card2);border:1px solid var(--line2)}
  .logout:hover{color:var(--red);border-color:rgba(228,72,93,.5)}

  .grid{display:grid;grid-template-columns:440px 1fr;gap:26px;max-width:1200px;margin:28px auto;padding:0 26px}
  @media(max-width:1000px){.grid{grid-template-columns:1fr}}
  @media(max-width:600px){
    .top{padding:11px 15px}
    .top .logo h1{font-size:16px}
    .userbox{gap:8px}
    .uname{display:none}
    .grid{margin:18px auto;padding:0 15px;gap:16px}
    .balance-card{padding:22px;border-radius:18px}
    .avail{font-size:34px}
    .panel{padding:18px;border-radius:18px}
  }

  /* ---------- balance card ---------- */
  .balance-card{border-radius:22px;padding:28px;position:relative;overflow:hidden;
    background:var(--card2);border:1px solid var(--line2)}
  .balance-card::before{content:"";position:absolute;inset:0;
    background:radial-gradient(340px 240px at 92% -30%, rgba(91,33,182,.13), transparent 60%)}
  .balance-card > *{position:relative}
  .lbl{color:var(--accent-tx);font-family:var(--mono);font-size:11px;letter-spacing:.18em;text-transform:uppercase;font-weight:500;
    display:inline-flex;align-items:center;gap:7px}
  .lbl::before{content:"";width:5px;height:5px;border-radius:50%;background:var(--accent-tx);box-shadow:0 0 6px var(--accent-tx)}
  .avail{font-family:var(--mono);font-size:42px;font-weight:600;margin:8px 0 4px;letter-spacing:-.02em;font-variant-numeric:tabular-nums}
  .avail small{font-family:var(--mono);font-size:15px;font-weight:500;color:var(--muted);letter-spacing:0}
  .subbal{display:flex;gap:24px;margin-top:14px;color:var(--muted);font-size:13px}
  .subbal b{color:var(--text);font-weight:600;font-family:var(--mono);font-variant-numeric:tabular-nums}
  .subbal .warn b{color:var(--amber)}
  .wallet-id{margin-top:18px;display:flex;align-items:center;gap:9px;font-size:12px;color:var(--muted)}
  .wallet-id code{font-family:var(--mono);background:#0a0a0a;border:1px solid var(--line);padding:5px 9px;border-radius:8px;font-size:10.5px;color:var(--muted)}
  .copy{color:var(--muted);font-size:12px;padding:3px 7px;border-radius:10px;font-family:var(--mono);transition:.15s}
  .copy:hover{color:var(--accent-tx);background:rgba(91,33,182,.12)}

  .actions{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:20px}
  .act{background:var(--card);border:1px solid var(--line2);border-radius:12px;padding:17px 8px 14px;
    display:flex;flex-direction:column;align-items:center;gap:9px;transition:.15s}
  .act:hover{border-color:var(--accent2)}
  .act .ico{width:44px;height:44px;border-radius:12px;display:grid;place-items:center;
    background:#0a0a0a;border:1px solid var(--line);color:var(--accent-tx);transition:.15s}
  .act:hover .ico{border-color:rgba(91,33,182,.4)}
  .act span{font-size:13px;font-weight:500}

  .kyc-line{margin-top:18px;background:var(--card);border:1px solid var(--line2);border-radius:12px;
    padding:14px 18px;font-size:13px;color:var(--muted);display:flex;justify-content:space-between;align-items:center}
  .kyc-line b{color:var(--text);font-family:var(--mono);font-variant-numeric:tabular-nums}

  /* ---------- history panel ---------- */
  .panel{background:var(--card);border:1px solid var(--line2);border-radius:22px;padding:24px}
  .panel h2{margin:0 0 16px;font-size:17px;display:flex;justify-content:space-between;align-items:center;font-weight:600}
  .filters{display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap}
  .fchip{padding:7px 14px;border-radius:999px;font-size:11px;background:var(--card2);
    border:1px solid var(--line2);color:var(--muted);transition:.12s;font-family:var(--mono)}
  .fchip:hover{border-color:var(--dim);color:var(--text)}
  .fchip.on{background:rgba(91,33,182,.15);border-color:rgba(91,33,182,.5);color:var(--accent-tx);font-weight:600}
  .hday{font-family:var(--mono);font-size:11px;font-weight:500;letter-spacing:.14em;text-transform:uppercase;color:var(--dim);
    margin:16px 2px 4px}
  .hitem{display:flex;align-items:center;gap:14px;padding:11px 6px;border-radius:11px;animation:fadeUp .25s ease}
  .hitem:hover{background:rgba(255,255,255,.025)}
  .hico{width:42px;height:42px;border-radius:11px;display:grid;place-items:center;flex:none;background:#0a0a0a;border:1px solid var(--line)}
  .hico.in{color:var(--muted)} .hico.out{color:var(--red)} .hico.hold{color:var(--amber)} .hico.rev{color:var(--muted)}
  .ht{flex:1;min-width:0}
  .ht .t1{font-weight:600;font-size:14px;display:flex;align-items:center}
  .ht .t2{color:var(--muted);font-size:12px;margin-top:1px;font-family:var(--mono)}
  .hamt{font-family:var(--mono);font-weight:600;font-size:14.5px;white-space:nowrap;font-variant-numeric:tabular-nums}
  .amt-plus{color:var(--accent-tx)} .amt-minus{color:var(--red)} .amt-hold{color:var(--amber)} .amt-rev{color:var(--muted)}
  .hstat{font-family:var(--mono);font-size:10px;padding:2.5px 8px;border-radius:999px;margin-left:9px;font-weight:600;letter-spacing:.03em}
  .st-pending{background:rgba(232,196,122,.14);color:var(--amber)}
  .st-released{background:#1f1f1f;color:var(--muted)}
  .more{margin-top:14px}
  .empty{color:var(--muted);text-align:center;padding:46px 0;font-size:14px}
  .empty .big{font-size:34px;margin-bottom:8px}

  /* skeletons */
  .skel{border-radius:8px;background:linear-gradient(90deg,#141414 25%,#1f1f1f 45%,#141414 65%);
    background-size:200% 100%;animation:shimmer 1.2s infinite}
  @keyframes shimmer{from{background-position:200% 0}to{background-position:-200% 0}}

  /* ---------- modal ---------- */
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.74);backdrop-filter:blur(6px);
    display:flex;align-items:center;justify-content:center;z-index:50;padding:20px;animation:fade .18s ease}
  .modal{width:410px;max-width:100%;background:var(--card);
    border:1px solid var(--line2);border-radius:22px;padding:26px;
    max-height:92vh;overflow:auto;animation:fadeUp .25s ease}
  @media(max-width:560px){
    .overlay{align-items:flex-end;padding:0}
    .modal{border-radius:22px 22px 0 0;width:100%;animation:sheet .28s ease}
  }
  @keyframes fade{from{opacity:0}}
  @keyframes fadeUp{from{opacity:0;transform:translateY(14px)}}
  @keyframes sheet{from{transform:translateY(60%)}}
  .modal h3{margin:0 0 4px;font-size:18.5px;font-weight:600}
  .modal .sub{margin:0 0 18px}
  .mrow{margin-bottom:13px}
  .mrow label{display:block;font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:7px}
  .mbtns{display:flex;gap:10px;margin-top:20px}
  .merr{color:var(--red);font-size:13px;min-height:18px;margin-top:10px}
  .amount-chips{display:flex;gap:8px;margin-top:9px;flex-wrap:wrap}
  .achip{padding:6px 12px;border-radius:999px;font-size:12.5px;background:var(--card2);
    border:1px solid var(--line2);color:var(--muted);font-family:var(--mono)}
  .achip:hover{border-color:var(--accent2);color:var(--accent-tx)}
  .big-in{font-family:var(--mono);font-size:24px;font-weight:600;text-align:right;font-variant-numeric:tabular-nums;padding:14px 16px}

  /* OTP boxes */
  .otp-boxes{display:flex;gap:9px;justify-content:center;margin:6px 0 2px}
  .otp-b{font-family:var(--mono);width:50px;height:60px;text-align:center;font-size:26px;font-weight:600;padding:0;border-radius:12px}
  .otp-bar-wrap{height:4px;background:var(--card2);border-radius:999px;margin-top:16px;overflow:hidden}
  .otp-bar{height:100%;background:var(--accent);border-radius:999px;
    transition:width 1s linear}
  .otp-timer{font-size:12px;color:var(--muted);text-align:center;margin-top:8px}
  .otp-timer b{color:var(--text);font-family:var(--mono)}
  .otp-note{background:rgba(34,158,217,.08);border:1px solid rgba(34,158,217,.25);color:#9cc9ec;
    border-radius:11px;padding:10px 13px;font-size:12.5px;margin-top:14px;display:flex;gap:9px;align-items:flex-start}
  .shake{animation:shake .4s}
  @keyframes shake{10%,90%{transform:translateX(-2px)}20%,80%{transform:translateX(4px)}
    30%,50%,70%{transform:translateX(-6px)}40%,60%{transform:translateX(6px)}}

  /* recipient */
  .recip{display:flex;align-items:center;gap:13px;background:var(--card2);border:1px solid rgba(91,33,182,.4);
    border-radius:12px;padding:13px 15px;margin-top:4px;animation:fadeUp .2s ease}
  .recip .n{font-weight:600}
  .recip .p{font-size:12px;color:var(--muted);font-family:var(--mono)}
  .link{color:var(--info);font-size:12.5px;background:none;padding:4px 2px}
  .link:hover{text-decoration:underline}
  .qchips{display:flex;gap:8px;margin-top:8px}

  /* qr / intent */
  .qr-img{display:block;margin:10px auto;border-radius:14px;background:#fff;padding:11px;max-width:235px;width:100%}
  .tok{font-family:var(--mono);font-size:10.5px;word-break:break-all;background:var(--card2);border:1px solid var(--line);
    border-radius:10px;padding:9px;color:var(--muted);max-height:88px;overflow:auto;margin-top:8px}
  details summary{cursor:pointer;color:var(--muted);font-size:12.5px;margin-top:10px}
  .intent{background:var(--card2);border:1px solid var(--line2);border-radius:14px;padding:18px;margin:12px 0;text-align:center}
  .intent .a{font-family:var(--mono);font-size:30px;font-weight:600;color:var(--accent-tx);font-variant-numeric:tabular-nums}
  .intent .to{font-size:12.5px;color:var(--muted);margin-top:8px}
  .verified{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--accent-tx);
    background:rgba(91,33,182,.12);padding:4px 11px;border-radius:999px;margin-top:10px}

  /* success */
  .success-wrap{text-align:center;padding:6px 0}
  .ck{width:84px;height:84px;margin:8px auto 18px}
  .ck circle{fill:none;stroke:var(--accent2);stroke-width:2.5;stroke-dasharray:166;stroke-dashoffset:166;
    animation:draw .5s ease forwards}
  .ck path{fill:none;stroke:var(--accent2);stroke-width:3;stroke-linecap:round;stroke-linejoin:round;
    stroke-dasharray:48;stroke-dashoffset:48;animation:draw .35s .45s ease forwards}
  @keyframes draw{to{stroke-dashoffset:0}}
  .success-amt{font-family:var(--mono);font-size:30px;font-weight:600;margin:4px 0 2px;font-variant-numeric:tabular-nums}

  /* toasts */
  .toasts{position:fixed;right:22px;bottom:22px;display:flex;flex-direction:column;gap:10px;z-index:99}
  .toast{display:flex;align-items:center;gap:10px;background:var(--card);color:var(--text);
    border:1px solid var(--line2);border-radius:12px;padding:13px 17px;
    box-shadow:var(--glow);font-size:14px;font-weight:500;animation:fadeUp .25s ease}
  .toast.bad{background:var(--card);border-color:rgba(228,72,93,.45);color:#ffd6dd}
</style>
</head>
<body>

<!-- ====================== LOGIN ====================== -->
<div id="loginScreen" class="login-wrap">
  <div class="login">
    <div class="login-head">
      <div class="logo">
        <div class="logo-badge"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="5" width="20" height="14" rx="3"/><path d="M2 10h20"/><path d="M6 15h4"/></svg></div>
        <h1>Hamyon</h1>
      </div>
      <div style="display:flex;align-items:center;gap:10px">
        <a class="iconbtn botlink" href="https://t.me/hamyon_bot_bot" target="_blank" rel="noopener" data-i18n-title="our_bot" aria-label="Telegram">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2L11 13"/><path d="M22 2l-7 20-4-9-9-4 20-7z"/></svg>
        </a>
        <button class="langtog" onclick="toggleLang()">UZ</button>
      </div>
    </div>
    <p class="sub" data-i18n="brand_sub">Ledger-кошелёк · деньги как журнал событий</p>

    <div class="demo-accounts">
      <button class="acc" onclick="quick('alice')">
        <div class="avatar av-0">A</div>
        <div class="meta"><div class="n">Alice</div><div class="d" data-i18n="acc_alice">KYC: FULL · лимит 50 млн сум</div></div>
        <svg class="go" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
      </button>
      <button class="acc" onclick="quick('bob')">
        <div class="avatar av-1">B</div>
        <div class="meta"><div class="n">Bob</div><div class="d" data-i18n="acc_bob">KYC: BASIC · лимит 5 млн сум</div></div>
        <svg class="go" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
      </button>
    </div>

    <div class="divider" data-i18n="or_manual">или вручную</div>
    <div class="field"><input id="liUser" data-i18n-ph="ph_login" placeholder="Логин" autocomplete="username"></div>
    <div class="field"><input id="liPass" type="password" data-i18n-ph="ph_pass" placeholder="Пароль" autocomplete="current-password"></div>
    <button class="btn btn-primary" id="liGo" onclick="login()" data-i18n="btn_login">Войти</button>
    <div class="err" id="liErr"></div>
    <a href="/about" data-i18n="how_works" style="display:block;text-align:center;margin-top:16px;color:var(--cyan);font-size:13.5px;text-decoration:none">Как это вообще работает? →</a>
  </div>
</div>

<!-- ====================== APP ====================== -->
<div id="appScreen" class="hidden">
  <div class="top">
    <div class="logo">
      <div class="logo-badge"><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="5" width="20" height="14" rx="3"/><path d="M2 10h20"/><path d="M6 15h4"/></svg></div>
      <h1>Hamyon</h1>
    </div>
    <div class="userbox">
      <button class="langtog" onclick="toggleLang()">UZ</button>
      <span class="chip" id="kycBadge"></span>
      <div class="avatar av-0" id="uAvatar">?</div>

let LANG = localStorage.getItem('hamyon_lang') || 'ru';
const t = k => (I18N[LANG] && I18N[LANG][k]) || I18N.ru[k] || k;
const cur = () => t('cur');

function applyStatic(){
  document.documentElement.lang = LANG;
  document.title = t('doctitle');
  document.querySelectorAll('[data-i18n]').forEach(el => el.textContent = t(el.dataset.i18n));
  document.querySelectorAll('[data-i18n-ph]').forEach(el => el.placeholder = t(el.dataset.i18nPh));
  document.querySelectorAll('[data-i18n-title]').forEach(el => el.title = t(el.dataset.i18nTitle));
  document.querySelectorAll('.langtog').forEach(b => b.textContent = LANG === 'ru' ? 'UZ' : 'RU');
}
function setLang(l){
  LANG = l;
  localStorage.setItem('hamyon_lang', l);
  applyStatic();
  if (S.token){ loadKyc(); if(!S.paginated) reloadHistory(); }
}
function toggleLang(){ setLang(LANG === 'ru' ? 'uz' : 'ru'); }

/* ============ state & helpers ============ */
const S = { token:null, user:null, wallet:null, cursor:null, filter:'', polls:[],
            paginated:false, lastBalance:null, quietUntil:0 };
const $ = id => document.getElementById(id);

const fmt = t2 => (t2/100).toLocaleString('ru-RU', {maximumFractionDigits:2});
const digitsOf = v => String(v).replace(/\D/g,'');
const uzs = v => Number(digitsOf(v)) * 100;   // UZS string -> tiyin
const avCls = n => 'av-' + ([...n].reduce((a,c)=>a+c.charCodeAt(0),0) % 4);
const cap = s => s ? s[0].toUpperCase() + s.slice(1) : s;   // display names capitalised

const ICONS = {
  in : '<svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 7v8M8.5 11.5L12 15l3.5-3.5"/></svg>',
  out: '<svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 17V9M8.5 12.5L12 9l3.5 3.5"/></svg>',
  hold:'<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V7a4 4 0 018 0v4"/></svg>',
  rev: '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V7a4 4 0 017.5-2"/></svg>',
  tg : '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="flex:none;margin-top:1px"><path d="M22 2L11 13"/><path d="M22 2l-7 20-4-9-9-4 20-7z"/></svg>',
  ok : '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 6L9 17l-5-5"/></svg>',
};

async function api(path, opts={}){
  const headers = {'Content-Type':'application/json', ...(opts.headers||{})};
  if (S.token) headers['Authorization'] = 'Token ' + S.token;
  const res = await fetch('/api' + path, {...opts, headers});
  let data = null;
  const text = await res.text();
  if (text) { try { data = JSON.parse(text); } catch(e){} }
  if (!res.ok){
    const code = data && data.code;
    const msg = code ? (t('err_'+code)!=='err_'+code ? t('err_'+code) : code)
              : res.status===403 ? t('op_unavailable')
              : res.status===404 ? t('not_found')
              : data && data.detail ? data.detail
              : data ? Object.values(data).flat().join(' ') : (t('error') + ' ' + res.status);
    const err = new Error(msg); err.status = res.status; err.code = code; throw err;
  }
  return data;
}

function toast(msg, bad=false){
  const el = document.createElement('div');
  el.className = 'toast' + (bad?' bad':'');
  el.innerHTML = `<span style="color:${bad?'var(--red)':'var(--accent)'}">${bad?'✕':ICONS.ok}</span> ${msg}`;
  $('toasts').appendChild(el);
  setTimeout(()=>el.remove(), 4500);
}

async function busy(btn, fn){
  if (btn.disabled) return;
  btn.disabled = true; btn.classList.add('busy');
  try { await fn(); } finally { btn.disabled = false; btn.classList.remove('busy'); }
}

function animateNum(el, to){
  const from = el._v ?? to;
  el._v = to;
  if (from === to){ el.textContent = fmt(to); return; }
  const t0 = performance.now(), dur = 550;
  (function tick(tt){
    const k = Math.min(1, (tt - t0)/dur), e = 1-Math.pow(1-k,3);
    el.textContent = fmt(Math.round(from + (to-from)*e));
    if (k < 1) requestAnimationFrame(tick);
  })(t0);
}

function moneyInput(el){
  el.addEventListener('input', () => {
    const d = digitsOf(el.value);
    el.value = d ? Number(d).toLocaleString('ru-RU') : '';
  });
}

/* ============ auth ============ */
function quick(u){ $('liUser').value = u; $('liPass').value = 'demo123'; login(); }

async function login(){
  $('liErr').textContent = '';
  try{
    const body = new URLSearchParams({username:$('liUser').value, password:$('liPass').value});
    const res = await fetch('/api/auth/token/', {method:'POST', body});
    if (!res.ok) throw new Error(t('bad_login'));
    S.token = (await res.json()).token;
    S.user = $('liUser').value;
    localStorage.setItem('hamyon', JSON.stringify({token:S.token, user:S.user}));
    await enter();
  }catch(e){ $('liErr').textContent = e.message; }
}

function logout(){
  localStorage.removeItem('hamyon');
  S.polls.forEach(clearInterval);
  location.reload();
}

async function enter(){
  let wallets = await api('/wallet/');
  if (!wallets.length) wallets = [await api('/wallet/', {method:'POST'})];
  S.wallet = wallets[0];
  $('uName').textContent = cap(S.user);
  const av = $('uAvatar');
  av.textContent = S.user[0].toUpperCase();
  av.className = 'avatar ' + avCls(S.user);
  $('wId').textContent = S.wallet.id;
  $('loginScreen').classList.add('hidden');
  $('appScreen').classList.remove('hidden');
  await Promise.all([loadBalance(), loadKyc(), reloadHistory()]);
  S.polls.push(setInterval(loadBalance, 4000));
  S.polls.push(setInterval(()=>{ if(!S.paginated) reloadHistory(); }, 8000));
}

/* ============ balance / kyc ============ */
async function loadBalance(){
  try{
    const b = await api(`/wallet/${S.wallet.id}/balance/`);
    animateNum($('bAvail'), b.available);
    $('bTotal').textContent = fmt(b.balance);
    $('bHeld').textContent  = fmt(b.held);
    $('heldWrap').className = b.held > 0 ? 'warn' : '';
    if (S.lastBalance !== null && b.balance > S.lastBalance && Date.now() > S.quietUntil){
      toast(t('toast_incoming') + ' +' + fmt(b.balance - S.lastBalance) + ' ' + cur());
      reloadHistory();
    }
    S.lastBalance = b.balance;
  }catch(e){}
}

async function loadKyc(){
  try{
    const k = await api('/kyc/status/');
    const badge = $('kycBadge');
    badge.textContent = 'KYC: ' + k.level.toUpperCase();

  }catch(e){}
}

function copyWallet(){ navigator.clipboard.writeText(S.wallet.id); toast(t('toast_wallet_copied')); }

/* ============ history ============ */
const HMETA = {
  credit:  {ico:ICONS.in,  cls:'in',  key:'h_credit',   acls:'amt-plus',  sign:'+'},
  debit:   {ico:ICONS.out, cls:'out', key:'h_debit',    acls:'amt-minus', sign:'−'},
  hold:    {ico:ICONS.hold,cls:'hold',key:'h_hold',     acls:'amt-hold',  sign:''},
  reversal:{ico:ICONS.rev, cls:'rev', key:'h_reversal', acls:'amt-rev',   sign:''},
};

document.querySelectorAll('#filters .fchip').forEach(ch => ch.onclick = () => {
  document.querySelectorAll('#filters .fchip').forEach(c=>c.classList.remove('on'));
  ch.classList.add('on');
  S.filter = ch.dataset.f;
  reloadHistory();
});

function dayLabel(d){
  const now = new Date(), y = new Date(); y.setDate(now.getDate()-1);
  const same = (a,b)=>a.toDateString()===b.toDateString();
  if (same(d, now)) return t('day_today');
  if (same(d, y)) return t('day_yesterday');
  return d.toLocaleDateString('ru-RU', {day:'numeric', month:'long'});
}

async function reloadHistory(){
  S.cursor = null; S.paginated = false; S.lastDay = null;
  const data = await fetchHistory();
  renderHistory(data.results, true);
  S.cursor = data.next_cursor;
  $('moreBtn').classList.toggle('hidden', !S.cursor);
}

async function loadMore(){
  S.paginated = true;
  const data = await fetchHistory(S.cursor);
  renderHistory(data.results, false);
  S.cursor = data.next_cursor;
  $('moreBtn').classList.toggle('hidden', !S.cursor);
}

function fetchHistory(cursor){
  let q = `/wallet/${S.wallet.id}/history/?page_size=9`;
  if (S.filter) q += '&type=' + S.filter;
  if (cursor) q += '&cursor=' + encodeURIComponent(cursor);
  return api(q);
}

function renderHistory(items, replace){
  const list = $('hList');
  if (replace) list.innerHTML = '';
  if (!items.length && replace){
    list.innerHTML = `<div class="empty"><div class="big">🪙</div>${t('empty_title')}<br>${t('empty_sub')}</div>`;
    return;
  }
  for (const e of items){
    const m = HMETA[e.type];
    const d = new Date(e.created_at);
    const label = dayLabel(d);
    if (label !== S.lastDay){
      list.insertAdjacentHTML('beforeend', `<div class="hday">${label}</div>`);
      S.lastDay = label;
    }
    const stat = e.type==='hold'
      ? `<span class="hstat ${e.status==='pending'?'st-pending':'st-released'}">${e.status==='pending'?t('hold_active'):t('hold_released')}</span>` : '';
    list.insertAdjacentHTML('beforeend', `
      <div class="hitem">
        <div class="hico ${m.cls}">${m.ico}</div>
        <div class="ht">
          <div class="t1">${t(m.key)}${stat}</div>
          <div class="t2">${d.toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'})}</div>
        </div>
        <div class="hamt ${m.acls}">${m.sign}${fmt(e.amount)} ${cur()}</div>
      </div>`);
  }
}

function successModal(title, amount){
  S.quietUntil = Date.now() + 6000;
  modal(`<div class="success-wrap">
    <svg class="ck" viewBox="0 0 56 56"><circle cx="28" cy="28" r="26.5"/><path d="M17 29l8 8 15-16"/></svg>

function amountField(id, placeholder){

/* ---- OTP step ---- */
function otpModal(title, sub, onSubmit){
  modal(`
    <h3>${title}</h3><p class="sub">${sub}</p>
    <div class="otp-boxes" id="otpBoxes">
      ${Array.from({length:6},(_,i)=>`<input class="otp-b" id="otp${i}" maxlength="1" inputmode="numeric">`).join('')}
    </div>
    <div class="otp-bar-wrap"><div class="otp-bar" id="otpBar" style="width:100%"></div></div>
    <div class="otp-timer" id="otpTimer">${t('otp_valid')} <b>1:30</b></div>
    <div class="otp-note">${ICONS.tg} ${t('otp_demo_note')}</div>
    <div class="merr" id="mErr"></div>
    <div class="mbtns">
      <button class="btn btn-ghost" onclick="closeModal()">${t('cancel')}</button>
      <button class="btn btn-primary" id="otpGo">${t('confirm')}</button>
    </div>`);

  const boxes = Array.from({length:6},(_,i)=>$('otp'+i));
  const val = () => boxes.map(b=>b.value).join('');
  boxes.forEach((b,i)=>{
    b.addEventListener('input', ()=>{
      b.value = b.value.replace(/\D/g,'').slice(-1);
      if (b.value && i<5) boxes[i+1].focus();
      if (val().length===6) $('otpGo').focus();
    });
    b.addEventListener('keydown', e=>{
      if (e.key==='Backspace' && !b.value && i>0) boxes[i-1].focus();
      if (e.key==='Enter') $('otpGo').click();
    });
  });
  boxes[0].addEventListener('paste', e=>{
    e.preventDefault();
    const d = (e.clipboardData.getData('text')||'').replace(/\D/g,'').slice(0,6);
    boxes.forEach((b,i)=>b.value = d[i]||'');
    (boxes[d.length-1]||boxes[0]).focus();
  });
  boxes[0].focus();

  // Demo deployment: auto-fill the code from the server (no real Telegram bot).
  api('/demo/last-otp/').then(r => {
    if (r && r.code && $('otpBoxes')) {
      [...String(r.code)].forEach((dch, i) => { if (boxes[i]) boxes[i].value = dch; });
      const note = document.querySelector('.otp-note');
      if (note) note.innerHTML = ICONS.tg + ' ' + t('otp_demo_filled');
    }
  }).catch(() => {});

  let left = 90;
  const iv = setInterval(()=>{
    left--;
    if (!$('otpBar')) { clearInterval(iv); return; }
    $('otpBar').style.width = Math.max(0, left/90*100) + '%';
    $('otpTimer').innerHTML = left>0
      ? `${t('otp_valid')} <b>${Math.floor(left/60)}:${String(left%60).padStart(2,'0')}</b>`
      : `<span style="color:var(--red)">${t('otp_expired')}</span>`;
    if (left<=0){ clearInterval(iv); $('otpGo').disabled = true; }
  }, 1000);

  $('otpGo').onclick = () => busy($('otpGo'), async ()=>{
    $('mErr').textContent = '';
    try{ await onSubmit(val()); clearInterval(iv); }
    catch(e){
      $('mErr').textContent = e.message;
      if (e.code==='otp_invalid'){
        $('otpBoxes').classList.add('shake');
        setTimeout(()=>$('otpBoxes') && $('otpBoxes').classList.remove('shake'), 450);
        boxes.forEach(b=>b.value=''); boxes[0].focus();
      }
    }
  });
}

/* ---- top-up / withdraw ---- */
function openPay(direction){
  const isUp = direction==='topup';
  modal(`
    <h3>${isUp?t('pay_topup_title'):t('pay_withdraw_title')}</h3>
    <p class="sub">${isUp?t('pay_topup_sub'):t('pay_withdraw_sub')}</p>
    ${amountField('payAmt', isUp?'50 000':'20 000')}
    <div class="merr" id="mErr"></div>
    <div class="mbtns">
      <button class="btn btn-ghost" onclick="closeModal()">${t('cancel')}</button>
      <button class="btn btn-primary" id="payGo">${t('cont')}</button>
    </div>`);
  moneyInput($('payAmt')); $('payAmt').focus();
  $('payGo').onclick = () => busy($('payGo'), async ()=>{
    $('mErr').textContent = '';
    const amt = uzs($('payAmt').value);
    if (!amt){ $('mErr').textContent=t('enter_amount'); return; }
    try{
      const pr = await api('/payments/initiate/', {method:'POST', body:JSON.stringify({
        wallet_id:S.wallet.id, direction, amount:amt, idempotency_key:crypto.randomUUID()})});
      loadBalance();
      otpModal(t('otp_title'), `${isUp?t('pay_topup_word'):t('pay_withdraw_word')} · ${fmt(amt)} ${cur()}`, async code => {
        await api(`/payments/${pr.id}/confirm/`, {method:'POST', body:JSON.stringify({code})});
        successModal(isUp?t('succ_topup'):t('succ_withdraw'),
                     (isUp?'+':'−') + fmt(amt) + ' ' + cur());
      });
    }catch(e){ $('mErr').textContent = e.message; }
  });
}

/* ---- p2p transfer ---- */
function openTransfer(){
  modal(`
    <h3>${t('tr_title')}</h3><p class="sub">${t('tr_sub')}</p>
    <div class="mrow"><label>${t('tr_to')}</label>
      <div style="display:flex;gap:9px">
        <input id="trQuery" placeholder="${t('tr_ph')}">
        <button class="btn btn-ghost" style="width:auto;padding:0 18px" id="trFind">${t('find')}</button>
      </div>
      <div class="qchips">
        <button class="achip" onclick="$('trQuery').value='alice';$('trFind').click()">alice</button>
        <button class="achip" onclick="$('trQuery').value='bob';$('trFind').click()">bob</button>
        <button class="link" id="trManualLink">${t('enter_wallet_id')}</button>
      </div>
      <div id="recipBox"></div>
    </div>
    <div id="trRest" class="hidden">
      ${amountField('trAmt', '10 000')}
      <div class="merr" id="mErr"></div>
      <div class="mbtns">
        <button class="btn btn-ghost" onclick="closeModal()">${t('cancel')}</button>
        <button class="btn btn-primary" id="trGo">${t('cont')}</button>
      </div>
    </div>
    <div class="merr hidden" id="mErrTop"></div>`);

  let recipient = null;
  moneyInput($('trAmt'));

  const find = () => busy($('trFind'), async ()=>{
    $('mErrTop').classList.remove('hidden'); $('mErrTop').textContent = '';
    $('recipBox').innerHTML = '';
    try{
      const r = await api('/p2p/resolve/', {method:'POST',
        body:JSON.stringify({query: $('trQuery').value.trim()})});
      if (r.wallet_id === S.wallet.id){
        $('mErrTop').textContent = t('self_transfer'); return;
      }
      recipient = r;
      $('recipBox').innerHTML = `
        <div class="recip">
          <div class="avatar ${avCls(r.username)}">${r.username[0].toUpperCase()}</div>
          <div><div class="n">${cap(r.username)}</div><div class="p">${r.phone_masked}</div></div>
        </div>`;
      $('trRest').classList.remove('hidden');
      $('trAmt').focus();
    }catch(e){ $('mErrTop').textContent = e.message; }
  });
  $('trFind').onclick = find;
  $('trQuery').addEventListener('keydown', e=>{ if(e.key==='Enter') find(); });

  $('trManualLink').onclick = () => {
    $('recipBox').innerHTML = `<div class="mrow" style="margin-top:10px">
      <label>${t('recipient_wallet_id')}</label><input id="trUuid" placeholder="xxxxxxxx-xxxx-…"></div>`;
    recipient = 'manual';
    $('trRest').classList.remove('hidden');
  };

  $('trGo').onclick = () => busy($('trGo'), async ()=>{
    $('mErr').textContent = '';
    const to = recipient === 'manual' ? ($('trUuid')?.value||'').trim() : recipient?.wallet_id;
    const amt = uzs($('trAmt').value);
    if (!to){ $('mErr').textContent=t('choose_recipient'); return; }
    if (!amt){ $('mErr').textContent=t('enter_amount'); return; }
    const who = recipient === 'manual' ? t('by_wallet_id') : cap(recipient.username);
    try{
      const tr = await api('/p2p/transfer/', {method:'POST', body:JSON.stringify({
        sender_wallet:S.wallet.id, recipient_wallet:to, amount:amt,
        idempotency_key:crypto.randomUUID()})});
      otpModal(t('otp_title'), `${t('tr_word')} ${who} · ${fmt(amt)} ${cur()}`, async code => {
        await api(`/p2p/transfers/${tr.id}/confirm/`, {method:'POST', body:JSON.stringify({code})});
        successModal(t('tr_done'), '−' + fmt(amt) + ' ' + cur());
      });
    }catch(e){ $('mErr').textContent = e.message; }
  });
}

/* ---- scan & pay ---- */

    <h3>${t('scan_title')}</h3><p class="sub">${t('scan_sub')}</p>
    <div class="mrow"><textarea id="scTok" rows="4" placeholder="eyJhbGciOi…"></textarea></div>

    </div>`);
